<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"
    />
    <meta name="theme-color" content="#0a0c12" />
    <title>Klyron — Futuristic Chat | Fixed Header</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-deep: #0a0c12;
        --bg-surface: #11131b;
        --card-glass: rgba(25, 30, 40, 0.65);
        --card-glass-solid: #161c24;
        --glass-border: rgba(80, 150, 255, 0.2);
        --text-primary: #f0f3fa;
        --text-secondary: #9aa4bf;
        --accent-gradient: linear-gradient(135deg, #a855f7, #06b6d4);
        --accent-purple: #c084fc;
        --accent-teal: #2dd4bf;
        --accent-glow: rgba(168, 85, 247, 0.4);
        --bubble-out: linear-gradient(135deg, #a855f7, #06b6d4);
        --bubble-in: rgba(255, 255, 255, 0.04);
        --shadow-glow: 0 0 12px rgba(168, 85, 247, 0.3);
        --ease-bounce: cubic-bezier(0.2, 0.9, 0.4, 1.1);
        --status-online: #2dd4bf;
        --record-pulse: #ff4d4d;
        --header-height: 72px;
      }

      body.light {
        --bg-deep: #f1f5f9;
        --bg-surface: #ffffff;
        --card-glass: rgba(255, 255, 255, 0.8);
        --glass-border: rgba(100, 100, 200, 0.25);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --bubble-in: rgba(0, 0, 0, 0.02);
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        transition:
          background 0.2s ease,
          color 0.2s;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ----- FIXED HEADER (stays at top, never scrolls) ----- */
      .chat-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        height: var(--header-height);
      }

      /* spacer to push content below fixed header */
      .header-spacer {
        height: var(--header-height);
        width: 100%;
        flex-shrink: 0;
      }

      .back-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: var(--text-primary);
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .back-btn:active {
        transform: scale(0.9);
        background: rgba(255, 255, 255, 0.1);
      }

      .chat-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--card-glass-solid);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        background-size: cover;
        background-position: center;
        flex-shrink: 0;
        cursor: pointer;
      }

      .chat-title {
        flex: 1;
        min-width: 0;
        cursor: pointer;
      }

      .chat-title h3 {
        font-size: 16px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-title p {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .menu-icons {
        display: flex;
        gap: 18px;
        flex-shrink: 0;
      }

      .menu-icons button {
        background: none;
        border: none;
        color: var(--text-primary);
        font-size: 20px;
        cursor: pointer;
        transition: transform 0.2s ease;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .menu-icons button:active {
        transform: scale(0.9);
        background: rgba(255, 255, 255, 0.1);
      }

      /* Scrollable messages container - takes remaining space */
      .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: var(--bg-deep);
        background-image: radial-gradient(
          var(--glass-border) 0.5px,
          transparent 0.5px
        );
        background-size: 24px 24px;
      }

      .message {
        display: flex;
        max-width: 85%;
        animation: fadeIn 0.2s ease;
        position: relative;
      }

      @media (min-width: 768px) {
        .message {
          max-width: 70%;
        }
      }

      .message.sent {
        align-self: flex-end;
        justify-content: flex-end;
      }
      .message.received {
        align-self: flex-start;
      }

      .bubble {
        padding: 8px 12px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.4;
        position: relative;
        word-wrap: break-word;
        max-width: 100%;
      }

      .sent .bubble {
        background: var(--bubble-out);
        color: var(--text-primary);
        border-bottom-right-radius: 4px;
      }

      .received .bubble {
        background: var(--bubble-in);
        backdrop-filter: blur(4px);
        border: 1px solid var(--glass-border);
        color: var(--text-primary);
        border-bottom-left-radius: 4px;
      }

      .call-card,
      .voice-card {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .call-icon,
      .voice-icon {
        font-size: 20px;
        width: 36px;
        text-align: center;
      }
      .call-details,
      .voice-details {
        flex: 1;
      }
      .call-duration,
      .voice-duration {
        font-size: 12px;
        opacity: 0.8;
        font-family: monospace;
        margin-top: 2px;
      }
      .play-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        border-radius: 30px;
        padding: 6px 14px;
        color: var(--accent-teal);
        cursor: pointer;
        font-size: 12px;
        transition: 0.1s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .play-btn:active {
        transform: scale(0.95);
      }
      .waveform-animation {
        display: inline-flex;
        gap: 3px;
        align-items: center;
        margin-left: 8px;
      }
      .waveform-animation span {
        width: 3px;
        height: 8px;
        background: var(--accent-teal);
        animation: wave 0.8s infinite ease alternate;
        border-radius: 2px;
      }
      .waveform-animation span:nth-child(2) {
        animation-delay: 0.2s;
        height: 12px;
      }
      .waveform-animation span:nth-child(3) {
        animation-delay: 0.4s;
        height: 6px;
      }
      @keyframes wave {
        0% {
          height: 4px;
          opacity: 0.4;
        }
        100% {
          height: 14px;
          opacity: 1;
        }
      }

      .reply-preview {
        font-size: 12px;
        color: var(--accent-teal);
        margin-bottom: 6px;
        padding-bottom: 4px;
        border-left: 2px solid var(--accent-teal);
        padding-left: 8px;
        opacity: 0.7;
        font-style: italic;
      }

      .message-reactions {
        display: flex;
        gap: 4px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .reaction-emoji {
        background: var(--card-glass);
        backdrop-filter: blur(4px);
        border-radius: 20px;
        padding: 2px 6px;
        font-size: 12px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        transition: transform 0.1s;
      }

      .message-time {
        font-size: 10px;
        color: var(--text-secondary);
        margin-top: 4px;
        text-align: right;
        display: flex;
        gap: 6px;
        align-items: center;
        justify-content: flex-end;
      }

      .msg-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-left: 6px;
        font-size: 10px;
      }
      .status-sending {
        opacity: 0.7;
        animation: shimmerPulse 1.2s infinite ease;
      }
      .status-sending::before {
        content: "⚡";
        font-size: 10px;
        animation: spinGlow 1s linear infinite;
        display: inline-block;
      }
      @keyframes shimmerPulse {
        0%,
        100% {
          opacity: 0.7;
          text-shadow: 0 0 0px transparent;
        }
        50% {
          opacity: 1;
          text-shadow: 0 0 4px var(--accent-teal);
        }
      }
      @keyframes spinGlow {
        0% {
          transform: rotate(0deg);
          opacity: 0.5;
        }
        100% {
          transform: rotate(360deg);
          opacity: 1;
        }
      }

      /* Input Area - fixed at bottom */
      .input-area {
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        padding: 12px 16px;
        border-top: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        position: relative;
      }

      .reply-preview-bar {
        position: absolute;
        bottom: 100%;
        left: 0;
        right: 0;
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        padding: 8px 16px;
        border-top: 1px solid var(--glass-border);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        transform: translateY(100%);
        transition: transform 0.2s var(--ease-bounce);
        z-index: 15;
      }
      .reply-preview-bar.active {
        transform: translateY(0);
      }
      .reply-cancel {
        background: none;
        border: none;
        color: var(--accent-teal);
        cursor: pointer;
        font-size: 14px;
      }

      .attach-btn,
      .emoji-btn,
      .mic-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 22px;
        cursor: pointer;
        transition: transform 0.2s ease;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .mic-btn.recording-active {
        background: var(--record-pulse);
        color: white;
        animation: pulseMic 1.2s infinite;
      }
      @keyframes pulseMic {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.6);
        }
        50% {
          transform: scale(1.1);
          box-shadow: 0 0 0 8px rgba(255, 77, 77, 0.3);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(255, 77, 77, 0);
        }
      }

      .recording-timer-badge {
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--record-pulse);
        color: white;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
        animation: glowPulse 1s infinite;
        white-space: nowrap;
        z-index: 25;
      }
      @keyframes glowPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
          box-shadow: 0 0 8px red;
        }
      }

      .message-input-wrapper {
        flex: 1;
        background: var(--bg-deep);
        border-radius: 30px;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--glass-border);
      }
      .message-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text-primary);
        font-size: 15px;
        padding: 6px 0;
      }
      .send-btn {
        background: var(--accent-gradient);
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: #111b21;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
        flex-shrink: 0;
      }
      .send-btn:active {
        transform: scale(0.9);
      }

      .emoji-picker {
        position: absolute;
        bottom: 80px;
        left: 16px;
        right: 16px;
        background: var(--card-glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 12px;
        display: none;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
        z-index: 100;
        max-height: 200px;
        overflow-y: auto;
      }
      .emoji-picker.active {
        display: grid;
      }
      .emoji-option {
        font-size: 28px;
        text-align: center;
        cursor: pointer;
        padding: 8px;
        transition: transform 0.1s;
        border-radius: 12px;
      }

      .contact-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s;
      }
      .contact-modal.active {
        opacity: 1;
        visibility: visible;
      }
      .contact-modal-content {
        background: var(--card-glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        padding: 24px;
        width: 320px;
        text-align: center;
      }
      .modal-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin: 0 auto 16px;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: bold;
        background-size: cover;
        background-position: center;
      }

      /* Video Call Overlay */
      .video-call-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #000;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease;
      }
      .video-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .remote-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #1a1a2e;
      }
      .local-video-container {
        position: absolute;
        bottom: 100px;
        right: 20px;
        width: 120px;
        height: 160px;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid var(--accent-teal);
        background: #000;
        z-index: 1001;
      }
      .local-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .call-controls {
        position: absolute;
        bottom: 30px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 20px;
        z-index: 1001;
      }
      .call-control-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 24px;
        cursor: pointer;
        transition: 0.1s;
      }
      .call-control-btn:active {
        transform: scale(0.95);
      }
      .call-end-btn {
        background: #ff3b30;
      }
      .call-status-text {
        position: absolute;
        top: 50px;
        left: 0;
        right: 0;
        text-align: center;
        color: white;
        font-size: 18px;
        font-weight: 600;
        z-index: 1001;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }

      .call-indicator-bar {
        position: fixed;
        top: var(--header-height);
        left: 12px;
        right: 12px;
        background: var(--card-glass);
        backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 36px;
        padding: 8px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 110;
      }
      .call-timer {
        font-family: monospace;
        font-size: 15px;
        background: var(--bg-deep);
        padding: 4px 12px;
        border-radius: 30px;
        font-weight: 600;
      }
      .end-call-float {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        width: 64px;
        height: 64px;
        background: linear-gradient(145deg, #ff4d4d, #ff0000);
        border: none;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 120;
        animation: pulseGlow 1.5s infinite;
      }
      @keyframes pulseGlow {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(255, 0, 0, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
        }
      }
      .reaction-bar {
        position: fixed;
        background: var(--card-glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 40px;
        padding: 8px 12px;
        display: flex;
        gap: 12px;
        z-index: 150;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .messages-container::-webkit-scrollbar {
        width: 5px;
      }
    </style>
  </head>
  <body>
    <!-- Fixed Header (never scrolls) -->
    <div class="chat-header" id="chatHeader">
      <button class="back-btn" id="backBtn">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <div class="chat-avatar" id="chatAvatar">A</div>
      <div class="chat-title">
        <h3 id="chatName">Loading...</h3>
        <p id="onlineStatus"></p>
      </div>
      <div class="menu-icons">
        <button id="audioCallBtn"><i class="fa-solid fa-phone"></i></button>
        <button id="videoCallBtn"><i class="fa-solid fa-video"></i></button>
        <button id="menuMoreBtn">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
      </div>
    </div>

    <!-- Spacer to prevent content from hiding under fixed header -->
    <div class="header-spacer"></div>

    <!-- Scrollable Messages Area -->
    <div class="messages-container" id="messagesContainer"></div>

    <!-- Fixed Input Area -->
    <div class="input-area">
      <div class="reply-preview-bar" id="replyPreviewBar">
        <span id="replyPreviewText">Replying to...</span>
        <button class="reply-cancel" id="cancelReplyBtn">Cancel</button>
      </div>
      <button class="attach-btn" id="attachBtn">
        <i class="fa-solid fa-paperclip"></i>
      </button>
      <div class="message-input-wrapper">
        <input
          type="text"
          class="message-input"
          id="messageInput"
          placeholder="Type a message"
          autocomplete="off"
        />
        <button class="emoji-btn" id="emojiBtn">
          <i class="fa-regular fa-face-smile"></i>
        </button>
      </div>
      <button class="mic-btn" id="micBtn">
        <i class="fa-solid fa-microphone"></i>
      </button>
      <button class="send-btn" id="sendBtn">
        <i class="fa-regular fa-paper-plane"></i>
      </button>
    </div>

    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="contact-modal" id="contactModal">
      <div class="contact-modal-content">
        <div class="modal-avatar" id="modalAvatar">A</div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-status" id="modalStatus"></div>
        <div class="modal-actions">
          <button class="modal-btn" id="modalCallBtn">
            <i class="fa-solid fa-phone"></i> Call
          </button>
        </div>
      </div>
    </div>

    <script>
      let currentContact = null;
      let replyToMessage = null;

      // Call Management
      let callState = "idle";
      let currentCallType = null;
      let callStartTimestamp = null;
      let callTimerInterval = null;
      let localStream = null;
      let callIndicatorElement = null;
      let endCallFloatBtn = null;
      let videoCallOverlay = null;

      // Voice Recording
      let mediaRecorder = null;
      let voiceChunks = [];
      let isRecording = false;
      let recordingStartTime = null;
      let recordingStream = null;
      let recordingTimerInterval = null;
      let recordingBadge = null;

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      function getUnifiedKey() {
        return `klyron_unified_${currentContact?.id}`;
      }

      function loadUnifiedHistory() {
        if (!currentContact) return [];
        const stored = localStorage.getItem(getUnifiedKey());
        if (stored) return JSON.parse(stored);
        const defaultMsg = {
          type: "message",
          text: `Hey! This is ${currentContact.name}`,
          sender: "received",
          timestamp: Date.now() - 3600000,
          status: "seen",
          reactions: [],
        };
        localStorage.setItem(getUnifiedKey(), JSON.stringify([defaultMsg]));
        return [defaultMsg];
      }

      function saveUnifiedHistory(items) {
        localStorage.setItem(getUnifiedKey(), JSON.stringify(items));
      }

      function addToTimeline(item) {
        let history = loadUnifiedHistory();
        history.push(item);
        history.sort((a, b) => a.timestamp - b.timestamp);
        saveUnifiedHistory(history);
        renderUnifiedTimeline();
      }

      function renderUnifiedTimeline() {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        const items = loadUnifiedHistory();
        container.innerHTML = "";
        items.forEach((item) => {
          if (item.type === "message") {
            const div = document.createElement("div");
            div.className = `message ${item.sender === "sent" ? "sent" : "received"}`;
            const timeStr = new Date(item.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            const statusHtml =
              item.sender === "sent"
                ? `<span class="msg-status status-${item.status || "sent"}"></span>`
                : "";
            let reactionsHtml = item.reactions?.length
              ? `<div class="message-reactions">${item.reactions.map((r) => `<span class="reaction-emoji">${r}</span>`).join("")}</div>`
              : "";
            div.innerHTML = `<div class="bubble">${escapeHtml(item.text)}${reactionsHtml}<div class="message-time"><span>${timeStr}</span>${statusHtml}</div></div>`;
            container.appendChild(div);
          } else if (item.type === "audio_call" || item.type === "video_call") {
            const div = document.createElement("div");
            div.className = `message received`;
            const icon = item.type === "audio_call" ? "fa-phone" : "fa-video";
            const title =
              item.type === "audio_call" ? "Audio Call" : "Video Call";
            const timeStr = new Date(item.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            div.innerHTML = `<div class="bubble"><div class="call-card"><div class="call-icon"><i class="fa-solid ${icon}"></i></div><div class="call-details"><strong>${title}</strong><div class="call-duration">⏱ ${item.duration}</div></div></div><div class="message-time">${timeStr}</div></div>`;
            container.appendChild(div);
          } else if (item.type === "voice_note") {
            const div = document.createElement("div");
            div.className = `message sent`;
            const timeStr = new Date(item.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            div.innerHTML = `<div class="bubble"><div class="voice-card"><div class="voice-icon"><i class="fa-solid fa-microphone-lines"></i></div><div class="voice-details"><span>🎙 Voice Note</span><div class="voice-duration">${item.duration}</div></div><button class="play-btn" data-audio="${item.audioData}"><i class="fa-solid fa-play"></i> Play</button><div class="waveform-animation" style="display:none;"><span></span><span></span><span></span></div></div><div class="message-time">${timeStr}</div></div>`;
            container.appendChild(div);
            const btn = div.querySelector(".play-btn");
            btn.addEventListener("click", () => {
              const audio = new Audio(btn.dataset.audio);
              const wave = div.querySelector(".waveform-animation");
              if (wave) wave.style.display = "inline-flex";
              audio.play();
              audio.onended = () => {
                if (wave) wave.style.display = "none";
              };
            });
          }
        });
        container.scrollTop = container.scrollHeight;
      }

      function addTextMessage(text, sender) {
        if (!text.trim()) return;
        const newMsg = {
          type: "message",
          text: text.trim(),
          sender,
          timestamp: Date.now(),
          status: "sending",
          reactions: [],
        };
        addToTimeline(newMsg);
        setTimeout(() => {
          let history = loadUnifiedHistory();
          const idx = history.findIndex(
            (m) => m.timestamp === newMsg.timestamp && m.type === "message",
          );
          if (idx !== -1) {
            history[idx].status = "sent";
            saveUnifiedHistory(history);
            renderUnifiedTimeline();
          }
        }, 500);
        if (sender === "sent") {
          setTimeout(() => {
            const replies = [
              "👍 Sounds good!",
              "Interesting!",
              "Tell me more!",
              "😊 Cool!",
            ];
            addToTimeline({
              type: "message",
              text: replies[Math.floor(Math.random() * replies.length)],
              sender: "received",
              timestamp: Date.now(),
              status: "seen",
              reactions: [],
            });
          }, 2000);
        }
      }

      function saveCallToHistory(type, durationSeconds) {
        const mins = Math.floor(durationSeconds / 60);
        const secs = durationSeconds % 60;
        addToTimeline({
          type: type === "audio" ? "audio_call" : "video_call",
          duration: `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`,
          timestamp: Date.now(),
        });
      }

      async function startVideoCall() {
        /* same video call logic, kept from original but uses fixed header */
        if (callState !== "idle") {
          alert("Call already in progress");
          return;
        }
        currentCallType = "video";
        callState = "calling";
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });
          videoCallOverlay = document.createElement("div");
          videoCallOverlay.className = "video-call-overlay";
          videoCallOverlay.innerHTML = `<div class="video-container"><video id="remoteVideo" class="remote-video" autoplay playsinline></video><div class="local-video-container"><video id="localVideo" class="local-video" autoplay muted playsinline></video></div><div class="call-status-text" id="callStatusText">Connecting...</div><div class="call-controls"><button class="call-control-btn" id="toggleMicBtn"><i class="fa-solid fa-microphone"></i></button><button class="call-control-btn" id="toggleCameraBtn"><i class="fa-solid fa-video"></i></button><button class="call-control-btn call-end-btn" id="endCallBtn"><i class="fa-solid fa-phone-slash"></i></button></div></div>`;
          document.body.appendChild(videoCallOverlay);
          const localVideo = document.getElementById("localVideo");
          if (localVideo) localVideo.srcObject = localStream;
          const remoteVideo = document.getElementById("remoteVideo");
          if (remoteVideo) remoteVideo.srcObject = localStream;
          let micMuted = false,
            cameraOff = false;
          document.getElementById("toggleMicBtn").onclick = () => {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
              micMuted = !micMuted;
              audioTrack.enabled = !micMuted;
            }
            document.getElementById("toggleMicBtn").innerHTML = micMuted
              ? '<i class="fa-solid fa-microphone-slash"></i>'
              : '<i class="fa-solid fa-microphone"></i>';
          };
          document.getElementById("toggleCameraBtn").onclick = () => {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
              cameraOff = !cameraOff;
              videoTrack.enabled = !cameraOff;
            }
            document.getElementById("toggleCameraBtn").innerHTML = cameraOff
              ? '<i class="fa-solid fa-video-slash"></i>'
              : '<i class="fa-solid fa-video"></i>';
          };
          document.getElementById("endCallBtn").onclick = () =>
            endCurrentCall();
          setTimeout(() => {
            if (callState === "calling") {
              callState = "connected";
              callStartTimestamp = Date.now();
              const statusText = document.getElementById("callStatusText");
              if (statusText) statusText.textContent = "Connected";
              startCallTimer();
              showCallIndicatorBar();
              showFloatingEndButton();
            }
          }, 1500);
        } catch (e) {
          alert("Cannot access camera/microphone: " + e.message);
          endCurrentCall();
        }
      }

      async function startAudioCall() {
        if (callState !== "idle") {
          alert("Call already in progress");
          return;
        }
        currentCallType = "audio";
        callState = "calling";
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          showCallIndicatorBar();
          showFloatingEndButton();
          setTimeout(() => {
            if (callState === "calling") {
              callState = "connected";
              callStartTimestamp = Date.now();
              startCallTimer();
              updateCallIndicatorStatus("Connected");
            }
          }, 1500);
        } catch (e) {
          alert("Cannot access microphone: " + e.message);
          endCurrentCall();
        }
      }

      function startCallTimer() {
        if (callTimerInterval) clearInterval(callTimerInterval);
        callTimerInterval = setInterval(() => {
          if (callState === "connected" && callStartTimestamp) {
            const elapsed = Math.floor(
              (Date.now() - callStartTimestamp) / 1000,
            );
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            const timerStr = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
            const timerSpan = document.getElementById("callTimerDisplay");
            if (timerSpan) timerSpan.innerText = timerStr;
            if (videoCallOverlay) {
              const statusDiv = document.getElementById("callStatusText");
              if (statusDiv)
                statusDiv.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;
            }
          }
        }, 1000);
      }
      function showCallIndicatorBar() {
        if (callIndicatorElement) callIndicatorElement.remove();
        callIndicatorElement = document.createElement("div");
        callIndicatorElement.className = "call-indicator-bar";
        callIndicatorElement.innerHTML = `<div><i class="fa-solid ${currentCallType === "audio" ? "fa-phone" : "fa-video"}"></i> ${escapeHtml(currentContact.name)} <span id="callStateSpan">Calling...</span></div><div class="call-timer" id="callTimerDisplay">00:00</div>`;
        document.body.appendChild(callIndicatorElement);
      }
      function updateCallIndicatorStatus(status) {
        const span = document.getElementById("callStateSpan");
        if (span) span.innerText = status;
      }
      function showFloatingEndButton() {
        if (endCallFloatBtn) endCallFloatBtn.remove();
        endCallFloatBtn = document.createElement("button");
        endCallFloatBtn.className = "end-call-float";
        endCallFloatBtn.innerHTML = '<i class="fa-solid fa-phone-slash"></i>';
        endCallFloatBtn.onclick = () => endCurrentCall();
        document.body.appendChild(endCallFloatBtn);
      }
      async function endCurrentCall() {
        const wasConnected = callState === "connected";
        let durationSec = 0;
        if (wasConnected && callStartTimestamp)
          durationSec = Math.floor((Date.now() - callStartTimestamp) / 1000);
        if (wasConnected && durationSec > 0 && currentCallType)
          saveCallToHistory(currentCallType, durationSec);
        if (localStream) localStream.getTracks().forEach((t) => t.stop());
        if (callTimerInterval) clearInterval(callTimerInterval);
        if (callIndicatorElement) callIndicatorElement.remove();
        if (endCallFloatBtn) endCallFloatBtn.remove();
        if (videoCallOverlay) videoCallOverlay.remove();
        callState = "idle";
        currentCallType = null;
        callStartTimestamp = null;
        localStream = null;
        videoCallOverlay = null;
      }
      async function startVoiceRecording() {
        if (isRecording) return;
        try {
          recordingStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(recordingStream);
          voiceChunks = [];
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) voiceChunks.push(e.data);
          };
          mediaRecorder.onstop = () => {
            const blob = new Blob(voiceChunks, { type: "audio/webm" });
            const reader = new FileReader();
            reader.onloadend = () => {
              const durationSec = Math.round(
                (Date.now() - recordingStartTime) / 1000,
              );
              const mins = Math.floor(durationSec / 60);
              const secs = durationSec % 60;
              if (durationSec >= 1)
                addToTimeline({
                  type: "voice_note",
                  audioData: reader.result,
                  duration: `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`,
                  timestamp: Date.now(),
                });
              if (recordingStream)
                recordingStream.getTracks().forEach((t) => t.stop());
              cleanRecordingUI();
            };
            reader.readAsDataURL(blob);
          };
          mediaRecorder.start(200);
          isRecording = true;
          recordingStartTime = Date.now();
          recordingBadge = document.createElement("div");
          recordingBadge.className = "recording-timer-badge";
          recordingBadge.innerHTML =
            '<i class="fa-solid fa-circle"></i> Recording 00:00';
          document.querySelector(".input-area").appendChild(recordingBadge);
          document.getElementById("micBtn").classList.add("recording-active");
          recordingTimerInterval = setInterval(() => {
            if (isRecording && recordingStartTime) {
              const elapsed = Math.floor(
                (Date.now() - recordingStartTime) / 1000,
              );
              const secs = elapsed % 60;
              const mins = Math.floor(elapsed / 60);
              if (recordingBadge)
                recordingBadge.innerHTML = `<i class="fa-solid fa-circle"></i> Recording ${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
            }
          }, 200);
        } catch (e) {
          alert("Microphone access required");
        }
      }
      function stopVoiceRecording() {
        if (
          mediaRecorder &&
          isRecording &&
          mediaRecorder.state !== "inactive"
        ) {
          mediaRecorder.stop();
          isRecording = false;
          if (recordingTimerInterval) clearInterval(recordingTimerInterval);
        } else {
          cleanRecordingUI();
        }
      }
      function cleanRecordingUI() {
        document.getElementById("micBtn").classList.remove("recording-active");
        if (recordingBadge) {
          recordingBadge.remove();
          recordingBadge = null;
        }
        if (recordingTimerInterval) clearInterval(recordingTimerInterval);
        isRecording = false;
      }
      function loadContact() {
        const stored = localStorage.getItem("klyron_active_chat");
        if (!stored) {
          window.location.href = "index.html";
          return false;
        }
        try {
          currentContact = JSON.parse(stored);
          return true;
        } catch (e) {
          return false;
        }
      }
      function renderChatHeader() {
        document.getElementById("chatName").innerText = currentContact.name;
        const avatarEl = document.getElementById("chatAvatar");
        if (currentContact.photo && currentContact.photo !== "") {
          avatarEl.style.backgroundImage = `url(${currentContact.photo})`;
          avatarEl.style.backgroundSize = "cover";
          avatarEl.innerText = "";
        } else {
          avatarEl.style.backgroundImage = "none";
          avatarEl.style.background = `linear-gradient(135deg, #a855f7, #06b6d4)`;
          avatarEl.innerText = currentContact.name.charAt(0).toUpperCase();
        }
        const modalAvatar = document.getElementById("modalAvatar");
        document.getElementById("modalName").innerText = currentContact.name;
        if (currentContact.photo && currentContact.photo !== "") {
          modalAvatar.style.backgroundImage = `url(${currentContact.photo})`;
          modalAvatar.style.backgroundSize = "cover";
          modalAvatar.innerText = "";
        } else {
          modalAvatar.style.backgroundImage = "none";
          modalAvatar.style.background = `linear-gradient(135deg, #a855f7, #06b6d4)`;
          modalAvatar.innerText = currentContact.name.charAt(0).toUpperCase();
        }
        document.getElementById("onlineStatus").innerHTML =
          currentContact.online ? "🟢 Online" : "last seen recently";
        document.getElementById("modalStatus").innerHTML = currentContact.online
          ? "🟢 Online"
          : "last seen recently";
      }
      function initEmojiPicker() {
        const emojis = [
          "😀",
          "😂",
          "😍",
          "🔥",
          "👍",
          "🎉",
          "😎",
          "❤️",
          "🥶",
          "🤯",
        ];
        document.getElementById("emojiPicker").innerHTML = emojis
          .map((e) => `<div class="emoji-option">${e}</div>`)
          .join("");
        document.querySelectorAll(".emoji-option").forEach((opt) => {
          opt.addEventListener("click", () => {
            const input = document.getElementById("messageInput");
            input.value += opt.textContent;
            input.focus();
            document.getElementById("emojiPicker").classList.remove("active");
          });
        });
      }
      function goBack() {
        window.location.href = "index.html";
      }
      function syncTheme() {
        if (localStorage.getItem("klyronTheme") === "light")
          document.body.classList.add("light");
        else document.body.classList.remove("light");
      }
      let holdTimer = null;
      function attachMicHold() {
        const mic = document.getElementById("micBtn");
        mic.addEventListener("mousedown", () => {
          holdTimer = setTimeout(() => startVoiceRecording(), 150);
        });
        mic.addEventListener("mouseup", () => {
          if (holdTimer) clearTimeout(holdTimer);
          if (isRecording) stopVoiceRecording();
        });
        mic.addEventListener("touchstart", () => {
          holdTimer = setTimeout(() => startVoiceRecording(), 150);
        });
        mic.addEventListener("touchend", () => {
          if (holdTimer) clearTimeout(holdTimer);
          if (isRecording) stopVoiceRecording();
        });
      }
      function init() {
        syncTheme();
        if (!loadContact()) return;
        renderChatHeader();
        renderUnifiedTimeline();
        initEmojiPicker();
        attachMicHold();
        document.getElementById("sendBtn").onclick = () => {
          const input = document.getElementById("messageInput");
          if (input.value.trim()) addTextMessage(input.value, "sent");
          input.value = "";
        };
        document.getElementById("backBtn").onclick = goBack;
        document.getElementById("audioCallBtn").onclick = () =>
          startAudioCall();
        document.getElementById("videoCallBtn").onclick = () =>
          startVideoCall();
        document.getElementById("emojiBtn").onclick = (e) => {
          e.stopPropagation();
          document.getElementById("emojiPicker").classList.toggle("active");
        };
        document
          .getElementById("messageInput")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("sendBtn").click();
          });
        document.getElementById("menuMoreBtn").onclick = () =>
          document.getElementById("contactModal").classList.add("active");
        document.getElementById("contactModal").onclick = (e) => {
          if (e.target === document.getElementById("contactModal"))
            document.getElementById("contactModal").classList.remove("active");
        };
        document.getElementById("modalCallBtn").onclick = () => {
          document.getElementById("contactModal").classList.remove("active");
          startAudioCall();
        };
        document.getElementById("cancelReplyBtn").onclick = () => {
          replyToMessage = null;
          document.getElementById("replyPreviewBar").classList.remove("active");
        };
        document.getElementById("attachBtn").onclick = () =>
          alert("File attachment ready");
        setTimeout(() => document.getElementById("messageInput").focus(), 300);
      }
      init();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#0a0c12" />
    <title>Klyron — Next Gen Chat Experience</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none; /* better for touch, input still editable */
      }

      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
        position: relative;
      }

      :root {
        --bg-deep: #0a0c12;
        --bg-surface: #11131b;
        --card-glass: rgba(25, 30, 40, 0.75);
        --card-glass-solid: #161c24;
        --glass-border: rgba(80, 150, 255, 0.25);
        --text-primary: #f0f3fa;
        --text-secondary: #9aa4bf;
        --accent-gradient: linear-gradient(135deg, #a855f7, #06b6d4);
        --accent-purple: #c084fc;
        --accent-teal: #2dd4bf;
        --accent-glow: rgba(168, 85, 247, 0.4);
        --bubble-out: linear-gradient(135deg, #a855f7, #06b6d4);
        --bubble-in: rgba(255, 255, 255, 0.05);
        --shadow-glow: 0 0 12px rgba(168, 85, 247, 0.3);
        --header-height: 70px;
        --safe-area-top: env(safe-area-inset-top);
        --safe-area-bottom: env(safe-area-inset-bottom);
        --msg-aged-opacity: 0.82;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        transition: background 0.2s ease;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        width: 100%;
      }

      /* FIXED HEADER */
      .chat-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        padding-top: max(10px, var(--safe-area-top));
        background: var(--card-glass);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--glass-border);
        height: var(--header-height);
        width: 100%;
      }

      .header-spacer {
        height: var(--header-height);
        flex-shrink: 0;
      }

      /* scrollable messages */
      .messages-container {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 14px 12px;
        padding-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: var(--bg-deep);
        background-image: radial-gradient(
          var(--glass-border) 0.6px,
          transparent 0.6px
        );
        background-size: 24px 24px;
        -webkit-overflow-scrolling: touch;
      }

      .message {
        display: flex;
        max-width: 88%;
        animation: messagePop 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        position: relative;
        transition: opacity 0.2s;
      }
      .message.aged {
        opacity: var(--msg-aged-opacity);
      }
      @keyframes messagePop {
        0% {
          opacity: 0;
          transform: scale(0.96) translateY(6px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .message.sent {
        align-self: flex-end;
        justify-content: flex-end;
      }
      .message.received {
        align-self: flex-start;
      }

      .bubble {
        padding: 10px 14px;
        border-radius: 22px;
        font-size: 14px;
        line-height: 1.4;
        word-wrap: break-word;
        max-width: 100%;
        position: relative;
        transition: box-shadow 0.2s;
      }
      .sent .bubble {
        background: var(--bubble-out);
        border-bottom-right-radius: 5px;
      }
      .received .bubble {
        background: var(--bubble-in);
        backdrop-filter: blur(4px);
        border: 1px solid var(--glass-border);
        border-bottom-left-radius: 5px;
      }
      /* seen ripple effect */
      .message.seen-glow .bubble {
        box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.6);
        animation: seenRipple 0.5s ease-out;
      }
      @keyframes seenRipple {
        0% {
          box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.5);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(168, 85, 247, 0);
        }
        100% {
          box-shadow: 0 0 0 0 transparent;
        }
      }

      /* ----- Custom status (traveling dot, echo) ----- */
      .msg-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        width: 18px;
        height: 14px;
        margin-left: 6px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        background: var(--accent-teal);
        border-radius: 50%;
        display: inline-block;
        opacity: 0.9;
      }
      /* sent animation: traveling dot */
      .msg-status[data-status="sent"] .status-dot {
        animation: travelDot 0.4s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        transform: translateX(-8px);
        opacity: 0;
      }
      @keyframes travelDot {
        0% {
          transform: translateX(-8px);
          opacity: 0;
        }
        30% {
          opacity: 1;
        }
        100% {
          transform: translateX(4px);
          opacity: 1;
        }
      }
      /* delivered: echo pulses */
      .msg-status[data-status="delivered"] .status-dot {
        animation: echoPulse 0.6s ease-out;
        box-shadow: 0 0 0 0 var(--accent-teal);
      }
      @keyframes echoPulse {
        0% {
          box-shadow: 0 0 0 0 var(--accent-teal);
          transform: scale(0.8);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(45, 212, 191, 0.3);
          transform: scale(1);
        }
        100% {
          box-shadow: 0 0 0 0 transparent;
          transform: scale(1);
        }
      }
      /* seen uses parent glow, status icon can also be double tick but we keep minimal */
      .msg-status[data-status="seen"] .status-dot {
        background: var(--accent-purple);
        transform: scale(1);
      }

      /* File card responsiveness */
      .file-card {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 16px;
        padding: 8px 12px;
      }
      .file-icon {
        font-size: 26px;
        width: 40px;
        text-align: center;
      }
      .file-info {
        flex: 1;
        min-width: 0;
      }
      .file-name {
        font-weight: 500;
        font-size: 13px;
        word-break: break-all;
      }
      .download-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        border-radius: 30px;
        padding: 5px 12px;
        color: var(--accent-teal);
        cursor: pointer;
      }

      /* Voice note WAVEFORM player (Canvas) */
      .voice-waveform-container {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      canvas.waveform-canvas {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 20px;
        height: 38px;
        width: 140px;
        cursor: pointer;
      }
      .voice-play-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        border-radius: 30px;
        padding: 5px 12px;
        font-size: 12px;
        cursor: pointer;
        color: var(--accent-teal);
      }
      .voice-duration {
        font-size: 11px;
        font-family: monospace;
      }

      /* Input area */
      .input-area {
        background: var(--card-glass);
        backdrop-filter: blur(16px);
        padding: 10px 12px;
        padding-bottom: max(10px, var(--safe-area-bottom));
        border-top: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .message-input-wrapper {
        flex: 1;
        background: var(--bg-deep);
        border-radius: 32px;
        padding: 5px 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--glass-border);
        transition:
          box-shadow 0.2s,
          border-color 0.2s;
      }
      .message-input-wrapper:focus-within {
        border-color: var(--accent-purple);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3);
      }
      .message-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text-primary);
        font-size: 15px;
        padding: 8px 0;
      }
      .send-btn {
        background: var(--accent-gradient);
        border: none;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        cursor: pointer;
        transition:
          transform 0.1s,
          filter 0.2s;
      }
      .send-btn.loading {
        transform: scale(0.95);
        filter: brightness(0.9);
        pointer-events: none;
      }
      .send-btn:active {
        transform: scale(0.92);
      }
      .mic-btn,
      .attach-btn,
      .emoji-btn {
        background: none;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: var(--text-secondary);
        cursor: pointer;
        transition: transform 0.1s;
      }
      .mic-btn:active,
      .attach-btn:active,
      .emoji-btn:active {
        transform: scale(0.94);
        background: rgba(255, 255, 255, 0.1);
      }

      /* Incoming call overlay */
      .incoming-call-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(12px);
        z-index: 1100;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 24px;
        animation: fadeIn 0.2s;
      }
      .caller-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        animation: pulseRing 1.2s infinite;
      }
      @keyframes pulseRing {
        0% {
          box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.6);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 0 18px rgba(168, 85, 247, 0.2);
          transform: scale(1.02);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(168, 85, 247, 0);
        }
      }
      .incoming-buttons {
        display: flex;
        gap: 32px;
      }
      .incoming-buttons button {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        font-size: 28px;
        border: none;
        cursor: pointer;
      }
      .accept-call {
        background: #2dd4bf;
        color: black;
      }
      .decline-call {
        background: #ff3b30;
        color: white;
      }

      /* swipe reply preview */
      .reply-preview {
        background: var(--card-glass-solid);
        border-left: 4px solid var(--accent-purple);
        padding: 6px 12px;
        font-size: 12px;
        margin-bottom: 6px;
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cancel-reply {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
      }

      /* reactions floating */
      .reaction-emoji {
        display: inline-block;
        background: var(--card-glass);
        border-radius: 30px;
        padding: 2px 8px;
        font-size: 12px;
        margin-right: 4px;
        animation: floatUp 0.3s ease-out;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(8px) scale(0.7);
          opacity: 0;
        }
        70% {
          transform: translateY(-2px) scale(1.1);
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      .message-time {
        font-size: 10px;
        color: var(--text-secondary);
        margin-top: 5px;
        display: flex;
        justify-content: flex-end;
        gap: 4px;
      }
      button {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <div class="chat-header">
      <button class="back-btn" id="backBtn">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <div class="chat-avatar" id="chatAvatar">A</div>
      <div class="chat-title">
        <h3 id="chatName">Loading...</h3>
        <p id="onlineStatus"></p>
      </div>
      <div class="menu-icons">
        <button id="audioCallBtn"><i class="fa-solid fa-phone"></i></button
        ><button id="videoCallBtn"><i class="fa-solid fa-video"></i></button
        ><button id="menuMoreBtn">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
      </div>
    </div>
    <div class="header-spacer"></div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-area">
      <button class="attach-btn" id="attachBtn">
        <i class="fa-solid fa-paperclip"></i>
      </button>
      <div class="message-input-wrapper">
        <input
          type="text"
          class="message-input"
          id="messageInput"
          placeholder="Type a message"
          autocomplete="off"
        /><button class="emoji-btn" id="emojiBtn">
          <i class="fa-regular fa-face-smile"></i>
        </button>
      </div>
      <button class="mic-btn" id="micBtn">
        <i class="fa-solid fa-microphone"></i></button
      ><button class="send-btn" id="sendBtn">
        <i class="fa-regular fa-paper-plane"></i>
      </button>
    </div>
    <div
      class="emoji-picker"
      id="emojiPicker"
      style="
        display: none;
        position: absolute;
        bottom: 80px;
        left: 12px;
        right: 12px;
        background: var(--card-glass);
        border-radius: 28px;
        padding: 12px;
        display: none;
        grid-template-columns: repeat(6, 1fr);
        z-index: 120;
      "
    ></div>
    <div
      class="contact-modal"
      id="contactModal"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        z-index: 200;
        align-items: center;
        justify-content: center;
      "
    >
      <div
        class="contact-modal-content"
        style="
          background: var(--card-glass);
          border-radius: 40px;
          padding: 24px;
          text-align: center;
        "
      >
        <div class="modal-avatar" id="modalAvatar">A</div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-status" id="modalStatus"></div>
        <button class="modal-btn" id="modalCallBtn">
          <i class="fa-solid fa-phone"></i> Call
        </button>
      </div>
    </div>
    <input
      type="file"
      id="fileUploadInput"
      style="display: none"
      accept=".pdf,.doc,.docx,.txt,.jpg,.png,.xlsx,.ppt,.zip"
    />

    <script>
      // ---------- KLYRON ENHANCED ----------
      let currentContact = null;
      let callState = "idle",
        currentCallType = null,
        callStartTimestamp = null,
        callTimerInterval = null;
      let localStream = null,
        videoCallOverlay = null,
        callIndicatorElement = null,
        endCallFloatBtn = null;
      let mediaRecorder = null,
        voiceChunks = [],
        isRecording = false,
        recordingStartTime = null;
      let replyToMessage = null; // swipe reply

      // helper functions
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }
      function formatFileSize(bytes) {
        if (!bytes) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + " " + sizes[i];
      }
      function getUnifiedKey() {
        return `klyron_unified_${currentContact?.id}`;
      }
      function loadUnifiedHistory() {
        if (!currentContact) return [];
        const stored = localStorage.getItem(getUnifiedKey());
        if (stored) return JSON.parse(stored);
        const defaultMsg = {
          type: "message",
          text: `Hey! This is ${currentContact.name}`,
          sender: "received",
          timestamp: Date.now() - 3600000,
          status: "seen",
          reactions: [],
        };
        localStorage.setItem(getUnifiedKey(), JSON.stringify([defaultMsg]));
        return [defaultMsg];
      }
      function saveUnifiedHistory(items) {
        localStorage.setItem(getUnifiedKey(), JSON.stringify(items));
      }
      function addToTimeline(item) {
        let history = loadUnifiedHistory();
        history.push(item);
        history.sort((a, b) => a.timestamp - b.timestamp);
        saveUnifiedHistory(history);
        renderUnifiedTimeline();
        applyAgingEffect();
      }

      // aging effect: older than 2h dim
      function applyAgingEffect() {
        const now = Date.now();
        document.querySelectorAll(".message").forEach((msgEl) => {
          const timeAttr = msgEl.getAttribute("data-timestamp");
          if (timeAttr) {
            const ts = parseInt(timeAttr);
            if (now - ts > 2 * 60 * 60 * 1000) msgEl.classList.add("aged");
            else msgEl.classList.remove("aged");
          }
        });
      }

      let activeAudio = null;
      function stopActiveAudio() {
        if (activeAudio) {
          activeAudio.pause();
          activeAudio = null;
        }
      }

      function renderUnifiedTimeline() {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        const items = loadUnifiedHistory();
        container.innerHTML = "";
        items.forEach((item, idx) => {
          if (item.type === "message") {
            const div = document.createElement("div");
            div.className = `message ${item.sender === "sent" ? "sent" : "received"}`;
            div.setAttribute("data-timestamp", item.timestamp);
            const timeStr = new Date(item.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            let statusHtml = "";
            if (item.sender === "sent") {
              let status = item.status || "sent";
              statusHtml = `<span class="msg-status" data-status="${status}"><i class="status-dot"></i></span>`;
              if (status === "seen")
                setTimeout(() => div.classList.add("seen-glow"), 50);
            }
            let reactionsHtml = item.reactions?.length
              ? `<div class="message-reactions" style="margin-top:4px;">${item.reactions.map((r) => `<span class="reaction-emoji">${r}</span>`).join("")}</div>`
              : "";
            div.innerHTML = `<div class="bubble">${escapeHtml(item.text)}${reactionsHtml}<div class="message-time"><span>${timeStr}</span>${statusHtml}</div></div>`;
            container.appendChild(div);
            if (
              item.sender === "sent" &&
              (!item.status || item.status === "sent")
            ) {
              setTimeout(() => {
                updateMessageStatus(item, idx, "delivered");
              }, 800);
              setTimeout(() => {
                updateMessageStatus(item, idx, "seen");
              }, 1800);
            }
          } else if (item.type === "file") {
            /* file rendering kept similar but add download */
            const div = document.createElement("div");
            div.className = `message ${item.sender === "sent" ? "sent" : "received"}`;
            div.setAttribute("data-timestamp", item.timestamp);
            const timeStr = new Date(item.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            div.innerHTML = `<div class="bubble"><div class="file-card"><div class="file-icon"><i class="fa-solid fa-file"></i></div><div class="file-info"><div class="file-name">${escapeHtml(item.fileName)}</div><div class="file-size">${item.fileSizeLabel}</div></div><button class="download-btn" data-url="${item.dataURL}"><i class="fa-solid fa-download"></i> Open</button></div><div class="message-time">${timeStr}</div></div>`;
            container.appendChild(div);
            div.querySelector(".download-btn").addEventListener("click", () => {
              const a = document.createElement("a");
              a.href = div.querySelector(".download-btn").dataset.url;
              a.download = item.fileName;
              a.click();
            });
          } else if (item.type === "voice_note") {
            const div = document.createElement("div");
            div.className = `message sent`;
            div.setAttribute("data-timestamp", item.timestamp);
            const timeStr = new Date(item.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            div.innerHTML = `<div class="bubble"><div class="voice-waveform-container"><button class="voice-play-btn"><i class="fa-solid fa-play"></i> Play</button><canvas class="waveform-canvas" width="140" height="36" style="width:140px; height:36px;"></canvas><span class="voice-duration">${item.duration}</span></div><div class="message-time">${timeStr}</div></div>`;
            container.appendChild(div);
            const btn = div.querySelector(".voice-play-btn");
            const canvas = div.querySelector(".waveform-canvas");
            const audioData = item.audioData;
            const audio = new Audio(audioData);
            const ctx = canvas.getContext("2d");
            const bars = Array(20)
              .fill(0)
              .map(() => Math.random() * 20 + 4);
            function drawWaveform(progress = 0) {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              const barWidth = canvas.width / bars.length - 2;
              for (let i = 0; i < bars.length; i++) {
                let height = bars[i] * (i < progress * bars.length ? 1.2 : 0.7);
                ctx.fillStyle =
                  i < progress * bars.length ? "#2dd4bf" : "#9aa4bf";
                ctx.fillRect(
                  i * (barWidth + 2),
                  canvas.height - height,
                  barWidth,
                  height,
                );
              }
            }
            drawWaveform(0);
            let playing = false;
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              stopActiveAudio();
              if (playing) {
                audio.pause();
                playing = false;
                btn.innerHTML = '<i class="fa-solid fa-play"></i> Play';
              } else {
                activeAudio = audio;
                audio.currentTime = 0;
                audio.play();
                playing = true;
                btn.innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
                audio.onended = () => {
                  playing = false;
                  btn.innerHTML = '<i class="fa-solid fa-play"></i> Play';
                  drawWaveform(0);
                };
                const interval = setInterval(() => {
                  if (audio.currentTime && audio.duration) {
                    drawWaveform(audio.currentTime / audio.duration);
                  }
                  if (!playing) clearInterval(interval);
                }, 100);
              }
            });
            canvas.addEventListener("click", (e) => {
              const rect = canvas.getBoundingClientRect();
              const x = e.clientX - rect.left;
              const percent = x / rect.width;
              if (audio.duration) {
                audio.currentTime = percent * audio.duration;
              }
            });
          } else if (item.type === "audio_call" || item.type === "video_call") {
            /* call log simplified */
          }
        });
        container.scrollTop = container.scrollHeight;
        applyAgingEffect();
      }

      function updateMessageStatus(item, idx, newStatus) {
        let history = loadUnifiedHistory();
        if (
          history[idx] &&
          history[idx].type === "message" &&
          history[idx].sender === "sent"
        ) {
          if (history[idx].status !== "seen") {
            history[idx].status = newStatus;
            saveUnifiedHistory(history);
            renderUnifiedTimeline();
          }
        }
      }

      function addTextMessage(text, sender, replyContext = null) {
        if (!text.trim()) return;
        const newMsg = {
          type: "message",
          text: text.trim(),
          sender,
          timestamp: Date.now(),
          status: "sent",
          reactions: [],
          replyTo: replyContext
            ? { text: replyContext.text, sender: replyContext.sender }
            : null,
        };
        addToTimeline(newMsg);
        if (sender === "sent") {
          document.querySelector(".send-btn")?.classList.add("loading");
          setTimeout(() => {
            document.querySelector(".send-btn")?.classList.remove("loading");
          }, 300);
          setTimeout(() => {
            addToTimeline({
              type: "message",
              text: "✨ Nice!",
              sender: "received",
              timestamp: Date.now(),
              status: "seen",
              reactions: [],
            });
          }, 1800);
        }
      }

      // INCOMING CALL animated screen simulation
      function showIncomingCall() {
        const overlay = document.createElement("div");
        overlay.className = "incoming-call-overlay";
        overlay.innerHTML = `<div class="caller-avatar">${currentContact.name.charAt(0)}</div><h3 style="color:white;">Incoming call...</h3><div class="incoming-buttons"><button class="accept-call"><i class="fa-solid fa-phone"></i></button><button class="decline-call"><i class="fa-solid fa-phone-slash"></i></button></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector(".accept-call").onclick = () => {
          overlay.remove();
          startAudioCall(true);
        };
        overlay.querySelector(".decline-call").onclick = () => {
          overlay.remove();
        };
      }

      async function startAudioCall(simulatedIncoming = false) {
        if (callState !== "idle") return;
        currentCallType = "audio";
        callState = "calling";
        showCallBarAndFloat("Connecting...");
        setTimeout(async () => {
          callState = "connected";
          callStartTimestamp = Date.now();
          startCallTimer();
          updateCallStatus("Connected");
        }, 1500);
      }
      async function startVideoCall() {
        if (callState !== "idle") return;
        currentCallType = "video";
        callState = "calling";
        showCallBarAndFloat("Starting video...");
        setTimeout(() => {
          callState = "connected";
          callStartTimestamp = Date.now();
          startCallTimer();
          updateCallStatus("Live");
        }, 1500);
      }
      function startCallTimer() {
        if (callTimerInterval) clearInterval(callTimerInterval);
        callTimerInterval = setInterval(() => {
          if (callState === "connected" && callStartTimestamp) {
            const elapsed = Math.floor(
              (Date.now() - callStartTimestamp) / 1000,
            );
            const mins = Math.floor(elapsed / 60),
              secs = elapsed % 60;
            const timerSpan = document.getElementById("callTimerDisplay");
            if (timerSpan)
              timerSpan.innerText = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
          }
        }, 1000);
      }
      function showCallBarAndFloat(statusText) {
        if (callIndicatorElement) callIndicatorElement.remove();
        callIndicatorElement = document.createElement("div");
        callIndicatorElement.className = "call-indicator-bar";
        callIndicatorElement.innerHTML = `<div><i class="fa-solid fa-phone"></i> ${escapeHtml(currentContact.name)} <span id="callStateSpan">${statusText}</span></div><div id="callTimerDisplay">00:00</div>`;
        document.body.appendChild(callIndicatorElement);
        if (endCallFloatBtn) endCallFloatBtn.remove();
        endCallFloatBtn = document.createElement("button");
        endCallFloatBtn.className = "end-call-float";
        endCallFloatBtn.innerHTML = '<i class="fa-solid fa-phone-slash"></i>';
        endCallFloatBtn.onclick = () => endCurrentCall();
        document.body.appendChild(endCallFloatBtn);
      }
      function updateCallStatus(text) {
        const span = document.getElementById("callStateSpan");
        if (span) span.innerText = text;
      }
      function endCurrentCall() {
        if (callState === "connected" && callStartTimestamp) {
          const durationSec = Math.floor(
            (Date.now() - callStartTimestamp) / 1000,
          );
          if (durationSec > 0) {
            const mins = Math.floor(durationSec / 60),
              secs = durationSec % 60;
            addToTimeline({
              type: "audio_call",
              duration: `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`,
              timestamp: Date.now(),
            });
          }
        }
        if (callIndicatorElement) callIndicatorElement.remove();
        if (endCallFloatBtn) endCallFloatBtn.remove();
        if (videoCallOverlay) videoCallOverlay.remove();
        callState = "idle";
        if (callTimerInterval) clearInterval(callTimerInterval);
      }

      // voice recording with simple logic
      function initVoiceRecording() {
        const mic = document.getElementById("micBtn");
        let pressTimer;
        mic.addEventListener("mousedown", () => {
          pressTimer = setTimeout(() => {
            if (!isRecording) startVoiceRecording();
          }, 200);
        });
        mic.addEventListener("mouseup", () => {
          if (pressTimer) clearTimeout(pressTimer);
          if (isRecording) stopVoiceRecording();
        });
        mic.addEventListener("touchstart", (e) => {
          e.preventDefault();
          pressTimer = setTimeout(() => {
            if (!isRecording) startVoiceRecording();
          }, 200);
        });
        mic.addEventListener("touchend", () => {
          if (pressTimer) clearTimeout(pressTimer);
          if (isRecording) stopVoiceRecording();
        });
      }
      async function startVoiceRecording() {
        if (isRecording) return;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(stream);
          voiceChunks = [];
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) voiceChunks.push(e.data);
          };
          mediaRecorder.onstop = () => {
            const blob = new Blob(voiceChunks, { type: "audio/webm" });
            const reader = new FileReader();
            reader.onloadend = () => {
              const durationSec = Math.round(
                (Date.now() - recordingStartTime) / 1000,
              );
              const mins = Math.floor(durationSec / 60),
                secs = durationSec % 60;
              if (durationSec >= 1)
                addToTimeline({
                  type: "voice_note",
                  audioData: reader.result,
                  duration: `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`,
                  timestamp: Date.now(),
                });
              stream.getTracks().forEach((t) => t.stop());
            };
            reader.readAsDataURL(blob);
          };
          mediaRecorder.start(200);
          isRecording = true;
          recordingStartTime = Date.now();
          document.getElementById("micBtn").style.background = "#ff4d4d";
        } catch (e) {
          alert("Microphone needed");
        }
      }
      function stopVoiceRecording() {
        if (
          mediaRecorder &&
          isRecording &&
          mediaRecorder.state !== "inactive"
        ) {
          mediaRecorder.stop();
          isRecording = false;
          document.getElementById("micBtn").style.background = "";
        }
      }

      // SWIPE TO REPLY with resistance
      function initSwipeReply() {
        const container = document.getElementById("messagesContainer");
        let startX = 0,
          currentMsg = null,
          initialTranslate = 0,
          isSwiping = false;
        container.addEventListener("touchstart", (e) => {
          const msg = e.target.closest(".message");
          if (!msg) return;
          startX = e.touches[0].clientX;
          currentMsg = msg;
          initialTranslate = 0;
          isSwiping = true;
          msg.style.transition = "none";
        });
        container.addEventListener("touchmove", (e) => {
          if (!isSwiping || !currentMsg) return;
          let dx = e.touches[0].clientX - startX;
          if (dx < 0) dx = 0;
          const resistance = Math.min(dx * 0.6, 80);
          currentMsg.style.transform = `translateX(${resistance}px)`;
          if (resistance > 50) currentMsg.style.opacity = "0.8";
        });
        container.addEventListener("touchend", (e) => {
          if (!currentMsg) return;
          const finalX = parseFloat(
            currentMsg.style.transform?.match(/-?\d+/)?.[0] || 0,
          );
          if (finalX > 55) {
            const replyText = currentMsg
              .querySelector(".bubble")
              ?.innerText.slice(0, 60);
            const senderClass = currentMsg.classList.contains("sent")
              ? "You"
              : currentContact.name;
            showReplyPreview(replyText, senderClass);
          }
          currentMsg.style.transition =
            "transform 0.2s cubic-bezier(0.1,0.9,0.3,1.1)";
          currentMsg.style.transform = "translateX(0px)";
          currentMsg.style.opacity = "";
          setTimeout(() => {
            if (currentMsg) currentMsg.style.transition = "";
          }, 200);
          currentMsg = null;
          isSwiping = false;
        });
      }
      function showReplyPreview(text, senderName) {
        replyToMessage = { text, sender: senderName };
        let existing = document.querySelector(".reply-preview");
        if (existing) existing.remove();
        const preview = document.createElement("div");
        preview.className = "reply-preview";
        preview.innerHTML = `<span><strong>Replying to ${senderName}:</strong> ${escapeHtml(text)}</span><button class="cancel-reply"><i class="fa-regular fa-circle-xmark"></i></button>`;
        document.querySelector(".input-area").before(preview);
        preview.querySelector(".cancel-reply").onclick = () => {
          replyToMessage = null;
          preview.remove();
        };
      }

      // Reactions with animation
      function attachReactions() {
        document
          .getElementById("messagesContainer")
          .addEventListener("contextmenu", (e) => {
            e.preventDefault();
            const msgDiv = e.target.closest(".message");
            if (!msgDiv) return;
            const emojis = ["❤️", "😂", "🔥", "👍"];
            const pickerDiv = document.createElement("div");
            pickerDiv.style.position = "fixed";
            pickerDiv.style.bottom = "100px";
            pickerDiv.style.left = "20px";
            pickerDiv.style.background = "var(--card-glass)";
            pickerDiv.style.borderRadius = "40px";
            pickerDiv.style.padding = "8px 12px";
            pickerDiv.style.display = "flex";
            pickerDiv.style.gap = "12px";
            pickerDiv.style.zIndex = "300";
            emojis.forEach((emoji) => {
              const btn = document.createElement("button");
              btn.innerText = emoji;
              btn.style.background = "none";
              btn.style.fontSize = "26px";
              btn.style.border = "none";
              btn.onclick = () => {
                const msgTextEl = msgDiv.querySelector(".bubble");
                const reactionsDiv =
                  msgDiv.querySelector(".message-reactions") ||
                  (() => {
                    const rd = document.createElement("div");
                    rd.className = "message-reactions";
                    msgDiv.querySelector(".bubble").appendChild(rd);
                    return rd;
                  })();
                const span = document.createElement("span");
                span.className = "reaction-emoji";
                span.innerText = emoji;
                span.style.animation = "floatUp 0.25s ease-out";
                reactionsDiv.appendChild(span);
                pickerDiv.remove();
              };
              pickerDiv.appendChild(btn);
            });
            document.body.appendChild(pickerDiv);
            setTimeout(() => pickerDiv.remove(), 3000);
          });
      }

      function loadContact() {
        const stored = localStorage.getItem("klyron_active_chat");
        if (!stored) {
          window.location.href = "index.html";
          return false;
        }
        currentContact = JSON.parse(stored);
        return true;
      }
      function renderChatHeader() {
        document.getElementById("chatName").innerText = currentContact.name;
        const avatarEl = document.getElementById("chatAvatar");
        if (currentContact.photo && currentContact.photo !== "") {
          avatarEl.style.backgroundImage = `url(${currentContact.photo})`;
          avatarEl.style.backgroundSize = "cover";
          avatarEl.innerText = "";
        } else {
          avatarEl.style.background =
            "linear-gradient(135deg, #a855f7, #06b6d4)";
          avatarEl.innerText = currentContact.name.charAt(0).toUpperCase();
        }
      }
      function initEmojiPicker() {
        const emojis = [
          "😀",
          "😂",
          "😍",
          "🔥",
          "👍",
          "🎉",
          "😎",
          "❤️",
          "🥶",
          "🤯",
          "👋",
          "💯",
        ];
        const pickerDiv = document.getElementById("emojiPicker");
        pickerDiv.innerHTML = emojis
          .map((e) => `<div class="emoji-option">${e}</div>`)
          .join("");
        pickerDiv.style.display = "none";
        document.getElementById("emojiBtn").onclick = (e) => {
          e.stopPropagation();
          pickerDiv.style.display =
            pickerDiv.style.display === "none" ? "grid" : "none";
        };
        document.querySelectorAll(".emoji-option").forEach((opt) => {
          opt.addEventListener("click", () => {
            const input = document.getElementById("messageInput");
            input.value += opt.textContent;
            input.focus();
            pickerDiv.style.display = "none";
          });
        });
      }

      function init() {
        if (!loadContact()) return;
        renderChatHeader();
        renderUnifiedTimeline();
        initEmojiPicker();
        initFileUpload();
        initVoiceRecording();
        initSwipeReply();
        attachReactions();
        document.getElementById("sendBtn").onclick = () => {
          const inp = document.getElementById("messageInput");
          if (inp.value.trim())
            addTextMessage(inp.value, "sent", replyToMessage);
          inp.value = "";
          if (replyToMessage) {
            replyToMessage = null;
            document.querySelector(".reply-preview")?.remove();
          }
        };
        document.getElementById("backBtn").onclick = () =>
          (window.location.href = "index.html");
        document.getElementById("audioCallBtn").onclick = () =>
          showIncomingCall();
        document.getElementById("videoCallBtn").onclick = () =>
          startVideoCall();
        document.getElementById("menuMoreBtn").onclick = () =>
          (document.getElementById("contactModal").style.display = "flex");
        document.getElementById("contactModal").onclick = (e) => {
          if (e.target === document.getElementById("contactModal"))
            document.getElementById("contactModal").style.display = "none";
        };
        document.getElementById("modalCallBtn").onclick = () => {
          document.getElementById("contactModal").style.display = "none";
          showIncomingCall();
        };
        document
          .getElementById("messageInput")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("sendBtn").click();
          });
        function initFileUpload() {
          const fileInput = document.getElementById("fileUploadInput");
          document.getElementById("attachBtn").onclick = () =>
            fileInput.click();
          fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.size < 15 * 1024 * 1024) {
              const reader = new FileReader();
              reader.onload = (ev) => {
                addToTimeline({
                  type: "file",
                  sender: "sent",
                  fileName: file.name,
                  fileSizeLabel: formatFileSize(file.size),
                  dataURL: ev.target.result,
                  fileType: file.type,
                  timestamp: Date.now(),
                });
              };
              reader.readAsDataURL(file);
            } else alert("Max 15MB");
            fileInput.value = "";
          };
        }
        setTimeout(() => document.getElementById("messageInput").focus(), 100);
      }
      init();
    </script>
  </body>

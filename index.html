<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"
    />
    <title>Klyron — Living Messenger | Fixed Status Bar</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-deep: #0a0c12;
        --bg-surface: #11131b;
        --card-glass: rgba(25, 30, 40, 0.65);
        --card-glass-solid: #161c24;
        --glass-border: rgba(80, 150, 255, 0.2);
        --text-primary: #f0f3fa;
        --text-secondary: #9aa4bf;
        --accent-gradient: linear-gradient(135deg, #a855f7, #06b6d4);
        --accent-purple: #c084fc;
        --accent-teal: #2dd4bf;
        --accent-glow: rgba(168, 85, 247, 0.4);
        --status-online: #2dd4bf;
        --status-ring: linear-gradient(145deg, #a855f7, #06b6d4);
        --danger: #f87171;
        --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
        --shadow-glow: 0 0 12px rgba(168, 85, 247, 0.3);
        --ease-bounce: cubic-bezier(0.2, 0.9, 0.4, 1.1);
        --safe-bottom: max(12px, env(safe-area-inset-bottom));
        --topbar-height: 68px;
      }

      body.light {
        --bg-deep: #f1f5f9;
        --bg-surface: #ffffff;
        --card-glass: rgba(255, 255, 255, 0.8);
        --card-glass-solid: #ffffff;
        --glass-border: rgba(100, 100, 200, 0.25);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --accent-gradient: linear-gradient(135deg, #7c3aed, #0d9488);
        --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        transition:
          background 0.3s ease,
          color 0.2s;
        padding-bottom: calc(85px + var(--safe-bottom));
        padding-top: env(safe-area-inset-top);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ----- TOPBAR - fixed at very top ----- */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px clamp(16px, 5vw, 32px);
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        width: 100%;
        height: var(--topbar-height);
      }

      /* spacer to push content below fixed topbar */
      .topbar-spacer {
        height: var(--topbar-height);
        width: 100%;
      }

      .logo {
        font-family: "Space Grotesk", monospace;
        font-size: clamp(20px, 6vw, 28px);
        font-weight: 700;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: -0.5px;
      }

      .menu {
        display: flex;
        gap: clamp(8px, 3vw, 16px);
      }
      .menu button {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(4px);
        border: none;
        font-size: clamp(18px, 5vw, 22px);
        cursor: pointer;
        color: var(--text-primary);
        transition: all 0.2s var(--ease-bounce);
        width: clamp(36px, 8vw, 44px);
        height: clamp(36px, 8vw, 44px);
        border-radius: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .menu button:active {
        transform: scale(0.92);
        background: rgba(255, 255, 255, 0.2);
      }

      /* ----- FIXED STATUS SECTION - sits directly below topbar ----- */
      .status-section {
        position: fixed;
        top: var(--topbar-height);
        left: 0;
        right: 0;
        z-index: 99;
        background: var(--bg-surface);
        padding: 12px 0 12px clamp(16px, 4vw, 24px);
        border-bottom: 1px solid var(--glass-border);
        overflow-x: auto;
        scrollbar-width: thin;
        -webkit-overflow-scrolling: touch;
        backdrop-filter: blur(2px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .status-scroll {
        display: flex;
        gap: clamp(16px, 5vw, 32px);
        width: max-content;
        min-width: 100%;
      }
      .status-item {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        min-width: clamp(64px, 12vw, 80px);
        transition: transform 0.2s var(--ease-bounce);
      }
      .status-ring {
        width: clamp(64px, 12vw, 80px);
        height: clamp(64px, 12vw, 80px);
        border-radius: 50%;
        background: var(--status-ring);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: subtlePulse 2s infinite;
      }
      .status-avatar {
        width: calc(100% - 6px);
        height: calc(100% - 6px);
        border-radius: 50%;
        background: var(--card-glass-solid);
        display: flex;
        align-items: center;
        justify-content: center;
        background-size: cover;
        background-position: center;
      }
      .add-icon {
        background: var(--accent-gradient);
        border: none;
        font-size: clamp(18px, 5vw, 24px);
      }
      .status-name {
        font-size: clamp(11px, 3.5vw, 13px);
        font-weight: 500;
      }

      /* spacer for status section (pushes main content below both fixed bars) */
      .status-spacer {
        height: calc(108px + 8px);
      }
      /* adjust spacer height based on content */
      @media (max-width: 480px) {
        .status-spacer {
          height: 110px;
        }
      }

      /* smart hint */
      .smart-hint {
        background: linear-gradient(
          105deg,
          rgba(168, 85, 247, 0.15),
          rgba(6, 182, 212, 0.1)
        );
        margin: 12px clamp(12px, 4vw, 20px);
        padding: 10px 16px;
        border-radius: 32px;
        backdrop-filter: blur(8px);
        border: 1px solid var(--glass-border);
        font-size: clamp(12px, 3.5vw, 14px);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .hint-text-wrapper {
        flex: 1;
        min-width: 140px;
      }

      /* spaces banner */
      .spaces-banner {
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        margin: 8px clamp(12px, 4vw, 20px);
        padding: 12px 18px;
        border-radius: 28px;
        display: flex;
        align-items: center;
        gap: clamp(8px, 3vw, 16px);
        flex-wrap: wrap;
        cursor: pointer;
        border: 1px solid var(--glass-border);
        transition: all 0.25s var(--ease-bounce);
      }
      .spaces-banner strong {
        font-size: clamp(14px, 4vw, 16px);
      }
      .avatar-stack {
        display: flex;
        margin-left: auto;
        margin-right: 8px;
      }
      .stack-avatar {
        width: clamp(24px, 6vw, 32px);
        height: clamp(24px, 6vw, 32px);
        border-radius: 50%;
        border: 2px solid var(--bg-surface);
        margin-left: -8px;
        background: var(--accent-gradient);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(12px, 3.5vw, 14px);
      }

      /* search wrapper responsive */
      .search-container {
        padding: 8px clamp(12px, 4vw, 20px);
      }
      .search-wrapper {
        background: var(--card-glass);
        backdrop-filter: blur(8px);
        border-radius: 48px;
        padding: 6px 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        width: 100%;
      }
      #searchInput {
        background: transparent;
        border: none;
        flex: 1;
        color: var(--text-primary);
        outline: none;
        font-size: clamp(14px, 4vw, 16px);
        min-width: 50px;
      }
      .camera-btn {
        background: transparent;
        border: none;
        font-size: clamp(16px, 5vw, 20px);
        cursor: pointer;
        color: var(--text-secondary);
      }

      /* selector tabs */
      .selector-tabs {
        display: flex;
        gap: clamp(8px, 3vw, 14px);
        padding: 12px clamp(12px, 4vw, 20px);
        flex-wrap: wrap;
        background: transparent;
      }
      .selector-pill {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(4px);
        padding: 6px 16px;
        border-radius: 40px;
        font-size: clamp(12px, 3.5vw, 14px);
        font-weight: 600;
        cursor: pointer;
        color: var(--text-secondary);
        transition: all 0.2s var(--ease-bounce);
        white-space: nowrap;
      }
      .selector-pill.active {
        background: var(--accent-gradient);
        color: #0a0c12;
        box-shadow: var(--shadow-glow);
        transform: scale(1.02);
      }

      /* chat list responsive */
      .chat-list {
        padding: 0 clamp(8px, 3vw, 16px);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chat-item {
        display: flex;
        gap: clamp(12px, 4vw, 20px);
        padding: 12px clamp(12px, 4vw, 20px);
        border-radius: 28px;
        text-decoration: none;
        transition: all 0.25s var(--ease-bounce);
        cursor: pointer;
        align-items: center;
        background: var(--card-glass);
        backdrop-filter: blur(4px);
        border-left: 3px solid transparent;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        opacity: 0;
        transform: translateY(12px);
        animation: fadeSlideUp 0.35s forwards;
      }
      @keyframes fadeSlideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .avatar-wrap {
        position: relative;
        width: clamp(52px, 12vw, 68px);
        height: clamp(52px, 12vw, 68px);
        flex-shrink: 0;
      }
      .avatar,
      .avatar-fallback {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: clamp(18px, 5vw, 26px);
        box-shadow: var(--shadow-sm);
      }
      .online-dot {
        position: absolute;
        bottom: 4px;
        right: 4px;
        width: clamp(12px, 3.5vw, 16px);
        height: clamp(12px, 3.5vw, 16px);
        background: var(--status-online);
        border-radius: 50%;
        border: 2px solid var(--bg-deep);
      }
      .chat-info {
        flex: 1;
        min-width: 0;
      }
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 6px;
      }
      .name {
        font-weight: 700;
        font-size: clamp(15px, 4.5vw, 18px);
        letter-spacing: -0.2px;
        word-break: break-word;
      }
      .time {
        font-size: clamp(10px, 3vw, 12px);
        color: var(--text-secondary);
        white-space: nowrap;
      }
      .msg-preview {
        font-size: clamp(12px, 3.5vw, 13.5px);
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 4px;
      }
      .badge {
        background: var(--accent-gradient);
        color: #0f0f1a;
        font-weight: bold;
        font-size: 11px;
        padding: 2px 10px;
        border-radius: 40px;
        white-space: nowrap;
      }

      /* encryption footer */
      .encryption-badge {
        display: flex;
        justify-content: center;
        gap: 8px;
        font-size: clamp(10px, 3vw, 12px);
        margin: 20px 16px;
        opacity: 0.7;
        flex-wrap: wrap;
        text-align: center;
      }

      /* floating dock - fully responsive */
      .floating-dock {
        position: fixed;
        bottom: max(16px, var(--safe-bottom));
        left: 50%;
        transform: translateX(-50%);
        background: var(--card-glass);
        backdrop-filter: blur(20px);
        border-radius: 56px;
        display: flex;
        gap: clamp(20px, 8vw, 48px);
        padding: 10px 20px;
        border: 1px solid var(--glass-border);
        z-index: 30;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        width: auto;
        max-width: 90vw;
        justify-content: center;
      }
      .nav-link {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        font-size: clamp(10px, 3vw, 12px);
        color: var(--text-secondary);
        transition: all 0.2s var(--ease-bounce);
        cursor: pointer;
        white-space: nowrap;
      }
      .nav-link i {
        font-size: clamp(18px, 5vw, 22px);
      }
      .fab {
        position: fixed;
        bottom: max(90px, calc(16px + var(--safe-bottom) + 60px));
        right: max(16px, 5vw);
        width: clamp(52px, 12vw, 64px);
        height: clamp(52px, 12vw, 64px);
        border-radius: 40px;
        background: var(--accent-gradient);
        border: none;
        color: #111;
        font-size: clamp(22px, 6vw, 28px);
        box-shadow: var(--shadow-glow);
        cursor: pointer;
        z-index: 35;
        transition: all 0.15s var(--ease-bounce);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-secondary);
        font-size: clamp(14px, 4vw, 16px);
      }
      .greeting-toast {
        position: fixed;
        top: calc(var(--topbar-height) + 10px);
        left: 20px;
        right: 20px;
        max-width: 280px;
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        padding: 8px 16px;
        border-radius: 40px;
        font-size: 12px;
        border: 1px solid var(--glass-border);
        z-index: 110;
        pointer-events: none;
        animation: fadeInOut 4s forwards;
        white-space: nowrap;
        overflow-x: auto;
      }
      @media (max-width: 480px) {
        .greeting-toast {
          white-space: normal;
          font-size: 11px;
          max-width: 85%;
        }
        .floating-dock {
          gap: 18px;
          padding: 8px 18px;
        }
        .chat-item {
          padding: 10px 12px;
        }
      }
      @media (min-width: 1024px) {
        .chat-list {
          max-width: 800px;
          margin-left: auto;
          margin-right: auto;
        }
        .smart-hint,
        .spaces-banner,
        .search-container,
        .selector-tabs {
          max-width: 1000px;
          margin-left: auto;
          margin-right: auto;
        }
        .selector-tabs {
          justify-content: center;
        }
        /* adjust fixed bars for large screens */
        .topbar {
          padding-left: calc((100% - 1000px) / 2);
          padding-right: calc((100% - 1000px) / 2);
        }
        .status-section {
          padding-left: calc((100% - 1000px) / 2 + clamp(16px, 4vw, 24px));
          padding-right: calc((100% - 1000px) / 2 + 16px);
        }
      }

      @keyframes subtlePulse {
        0% {
          box-shadow: 0 0 0 0 var(--accent-glow);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(168, 85, 247, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(168, 85, 247, 0);
        }
      }
      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateY(-10px);
        }
        15% {
          opacity: 1;
          transform: translateY(0);
        }
        85% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Fixed Topbar -->
    <div class="topbar">
      <div class="logo">KΛYRON</div>
      <div class="menu">
        <button id="archiveBtn" aria-label="Archived">
          <i class="fa-regular fa-clock"></i>
        </button>
        <button id="settingsBtn" aria-label="Settings">
          <i class="fa-solid fa-gear"></i>
        </button>
        <button id="themeToggle" aria-label="Theme">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </div>

    <!-- Fixed Status Section (sits directly below topbar, no overlap) -->
    <div class="status-section">
      <div class="status-scroll" id="statusScroll"></div>
    </div>

    <!-- Spacers to prevent content from hiding under fixed bars -->
    <div class="topbar-spacer"></div>
    <div class="status-spacer"></div>

    <!-- Scrollable Main Content -->
    <div class="smart-hint" id="smartHint">
      <i class="fa-regular fa-lightbulb"></i>
      <div class="hint-text-wrapper">
        <span id="hintText">Connecting intelligence...</span>
      </div>
    </div>

    <div class="spaces-banner" id="communityBanner">
      <i class="fa-regular fa-compass"></i>
      <div>
        <strong>Spaces</strong
        ><small style="display: block; font-size: 11px"
          >Connect with circles & live groups</small
        >
      </div>
      <div class="avatar-stack">
        <div class="stack-avatar">✨</div>
        <div class="stack-avatar">🌐</div>
        <div class="stack-avatar">🎧</div>
      </div>
      <i class="fa-solid fa-arrow-right"></i>
    </div>

    <div class="search-container">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search or start new chat"
          autocomplete="off"
        />
        <button class="camera-btn" id="cameraBtn">
          <i class="fa-solid fa-camera"></i>
        </button>
      </div>
    </div>

    <div class="selector-tabs">
      <div class="selector-pill" data-filter="priority">Priority</div>
      <div class="selector-pill" data-filter="recent">Recent</div>
      <div class="selector-pill" data-filter="people">People</div>
      <div class="selector-pill" data-filter="groups">Groups</div>

    <div class="chat-list" id="chatList"></div>
    <div class="empty-state" id="emptyState">
      ✨ No conversations — start new connection

    <div class="encryption-badge">
      <i class="fa-solid fa-key"></i> Quantum-resistant encryption · Klyron mesh

    <button class="fab" id="newChatFab">

    <div class="floating-dock">

      function formatMessagePreview(msg) {
        const emojiRegex =
          /^([\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}\u{1F1E6}-\u{1F1FF}]+)$/u;
        if (emojiRegex.test(msg.trim()))
          return `<span class="emoji-only" style="font-size:20px;">${msg}</span>`;
        if (msg.includes("voice"))
          return `<i class="fa-solid fa-microphone"></i> ${msg}`;
        return msg;
      }

      function avatarHTML(user) {
        const firstLetter = user.name.charAt(0).toUpperCase();
        const accentColor = user.accent || "#a855f7";
        if (user.isGroup)
          return `<div class="avatar-wrap"><div class="avatar-fallback" style="background: linear-gradient(135deg,#a855f7,#2dd4bf);"><i class="fa-solid fa-users"></i></div>${user.online ? '<div class="online-dot"></div>' : ""}</div>`;
        if (user.photo)
          return `<div class="avatar-wrap"><img class="avatar" src="${user.photo}" style="box-shadow:0 0 0 2px ${accentColor}40;" onerror="this.style.display='none'; this.parentElement.querySelector('.fallback-img').style.display='flex';"><div class="avatar-fallback fallback-img" style="display:none;">${firstLetter}</div>${user.online ? '<div class="online-dot"></div>' : ""}</div>`;
        return `<div class="avatar-wrap"><div class="avatar-fallback" style="background: ${accentColor};">${firstLetter}</div>${user.online ? '<div class="online-dot"></div>' : ""}</div>`;
      }

      function getStaggerDelay(index) {
        return `${index * 0.03}s`;
      }

      function navigateToChat(user) {
        localStorage.setItem("klyron_active_chat", JSON.stringify(user));
        window.location.href = "chart.html";
      }

      function renderChats() {
        const query = searchQuery.toLowerCase();
        let filtered = [...users].filter((u) =>
          u.name.toLowerCase().includes(query),
        );
        if (currentFilter === "priority") {
          filtered = filtered.filter((u) => u.unread > 0 || u.online);
          filtered.sort((a, b) => b.unread - a.unread || b.online - a.online);
        } else if (currentFilter === "recent") {
          filtered.sort((a, b) =>
            a.time === "now" ? -1 : b.time.localeCompare(a.time),
          );
        } else if (currentFilter === "people") {
          filtered = filtered.filter((u) => !u.isGroup);
        } else if (currentFilter === "groups") {
          filtered = filtered.filter((u) => u.isGroup);
        }
        if (filtered.length === 0) {
          chatListEl.innerHTML = "";
          emptyStateEl.style.display = "block";
          return;
        }
        emptyStateEl.style.display = "none";
        chatListEl.innerHTML = filtered
          .map((user, idx) => {
            const previewHtml = formatMessagePreview(user.lastMessage);
            const groupTag = user.isGroup
              ? `<span style="font-size:10px; background:rgba(168,85,247,0.2); padding:2px 8px; border-radius:40px;">◉ Circle</span>`
              : "";
            const statusLine = user.online
              ? '<span style="color:#2dd4bf; font-weight:500;">● Live</span>'
              : `<span style="font-size:11px;">${user.lastSeen || "away"}</span>`;
            const accentBorder = `border-left-color: ${user.accent || "#a855f7"};`;
            return `<div class="chat-item" data-user-id="${user.id}" style="animation-delay: ${getStaggerDelay(idx)}; ${accentBorder}">
          ${avatarHTML(user)}
          <div class="chat-info">
            <div class="top-row"><span class="name">${user.name} ${groupTag}</span><span class="time">${user.time}</span></div>
            <div class="msg-preview">${previewHtml} ${user.unread > 0 ? `<span class="badge" style="background: ${user.accent || "#a855f7"};">${user.unread}</span>` : ""}</div>
            <div style="margin-top: 4px; font-size: 11px;">${statusLine}</div>
          </div>
        </div>`;
          })
          .join("");
        document.querySelectorAll(".chat-item").forEach((el) => {
          const userId = el.getAttribute("data-user-id");
          const user = users.find((u) => u.id === userId);
          if (user)
            el.addEventListener("click", (e) => {
              e.preventDefault();
              navigateToChat(user);
            });
        });
      }

      let hintIndex = 0;
      const hintMessages = [
        () =>
          `💡 You have ${users.reduce((a, b) => a + b.unread, 0)} unread messages. Prioritize wisely.`,
        () =>
          `🌟 ${users.filter((u) => u.online).length} friends online — say hello!`,
        () =>
          `🔔 ${users.find((u) => u.unread > 2)?.name || "Amina"} might need a reply.`,
        () => `✨ Klyron mesh — quantum-secure & always listening.`,
        () => `🎙️ Long press anywhere → instant voice message.`,
      ];
      function rotateHint() {
        if (!hintTextSpan) return;
        hintTextSpan.style.opacity = "0";
        setTimeout(() => {
          let newText = hintMessages[hintIndex % hintMessages.length]();
          if (currentFilter === "priority")
            newText =
              `🔥 Priority mode: ${users.filter((u) => u.unread > 0).length} urgent chats. ` +
              newText;
          hintTextSpan.innerText = newText;
          hintTextSpan.style.opacity = "1";
          hintIndex++;
        }, 200);
      }
      function startHintRotation() {
        if (hintInterval) clearInterval(hintInterval);
        rotateHint();
        hintInterval = setInterval(rotateHint, 6500);
      }

      function buildStatusRow() {
        let html = `<div class="status-item" id="myStatusBtn"><div class="status-ring my-status-ring"><div class="status-avatar add-icon" style="background:var(--accent-gradient);"><i class="fa-solid fa-plus"></i></div></div><span class="status-name">My status</span></div>`;
        storyStatuses.forEach((story) => {
          html += `<div class="status-item" data-status-user="${story.name}"><div class="status-ring"><div class="status-avatar" style="background-image: url(${story.photo}); background-size: cover;"></div></div><span class="status-name">${story.name}</span></div>`;
        });
        statusScroll.innerHTML = html;
        document
          .querySelectorAll("[data-status-user]")
          .forEach((el) =>
            el.addEventListener("click", () =>
              alert("✨ Story rings — animated updates"),
            ),
          );
        document
          .getElementById("myStatusBtn")
          ?.addEventListener("click", () =>
            alert("📸 Share a moment · futuristic status"),
          );
      }

      function showDynamicGreeting() {
        const hour = new Date().getHours();
        let greeting =
          hour < 12
            ? "☀️ Good morning, explorer."
            : hour < 18
              ? "🌤️ Good afternoon, creator."
              : "🌙 Good evening, dreamer.";
        const toast = document.createElement("div");
        toast.className = "greeting-toast";
        toast.innerText = `${greeting} Klyron is alive ✨`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
      }

      function simulateVoiceCapture() {
        alert(
          "🎙️ Voice capture simulated: 'Message recorded — AI transcribing'",
        );
      }
      let pressTimer = null;
      document.addEventListener("touchstart", (e) => {
        pressTimer = setTimeout(() => {
          simulateVoiceCapture();
          pressTimer = null;
        }, 600);
      });
      document.addEventListener("touchend", () => {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      });
      document.addEventListener("mousedown", (e) => {
        pressTimer = setTimeout(() => {
          simulateVoiceCapture();
          pressTimer = null;
        }, 600);
      });
      document.addEventListener("mouseup", () => {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      });

      function setActiveFilter(pill, filterValue) {
        document
          .querySelectorAll(".selector-pill")
          .forEach((p) => p.classList.remove("active"));
        pill.classList.add("active");
        currentFilter = filterValue;
        chatListEl.style.opacity = "0.6";
        setTimeout(() => {
          renderChats();
          chatListEl.style.opacity = "1";
        }, 80);
        rotateHint();
      }

      let onlineToggleInterval;
      function startPresenceJitter() {
        if (onlineToggleInterval) clearInterval(onlineToggleInterval);
        onlineToggleInterval = setInterval(() => {
          const lina = users.find((u) => u.id === "lina");
          if (lina) {
            lina.online = !lina.online;
            lina.lastSeen = lina.online ? "online" : "last seen 2 min ago";
            renderChats();
          }
          const zainab = users.find((u) => u.id === "zainab");
          if (zainab) {
            zainab.online = !zainab.online;
            zainab.lastSeen = zainab.online ? "online" : "last seen 5 min ago";
            renderChats();
          }
        }, 20000);
      }

      function init() {
        buildStatusRow();
        renderChats();
        startHintRotation();
        startPresenceJitter();
        setActiveFilter(
          document.querySelector('.selector-pill[data-filter="priority"]'),
          "priority",
        );
        showDynamicGreeting();
        searchInput.addEventListener("input", (e) => {
          clearTimeout(window.searchDebounce);
          window.searchDebounce = setTimeout(() => {
            searchQuery = e.target.value;
            renderChats();
          }, 150);
        });
        document
          .querySelectorAll(".selector-pill")
          .forEach((pill) =>
            pill.addEventListener("click", () =>
              setActiveFilter(pill, pill.getAttribute("data-filter")),
            ),
          );
        document
          .getElementById("newChatFab")
          .addEventListener("click", () =>
            alert("✨ New conversation · Voice or text"),
          );
        document
          .getElementById("cameraBtn")
          .addEventListener("click", () =>
            alert("📸 Capture moment · AI captions"),
          );
        document
          .getElementById("archiveBtn")
          .addEventListener("click", () =>
            alert("📦 Archived · stored in secure vault"),
          );
        document
          .getElementById("settingsBtn")
          .addEventListener("click", () =>
            alert("⚙️ Klyron OS · themes, privacy, neural settings"),
          );
        document
          .getElementById("communityBanner")
          .addEventListener("click", () =>
            alert("🌀 Spaces — dynamic circles, live events, shared timelines"),
          );
        document.querySelectorAll(".nav-link").forEach((link) =>
          link.addEventListener("click", (e) => {
            e.preventDefault();
            const navType = link.getAttribute("data-nav");
            document
              .querySelectorAll(".nav-link")
              .forEach((l) => l.classList.remove("active"));
            link.classList.add("active");
            if (navType !== "chats")
              alert(
                `🚀 "${navType}" module — immersive experience coming soon`,
              );
            else renderChats();
          }),
        );
        const toggleBtn = document.getElementById("themeToggle"),
          themeIcon = toggleBtn.querySelector("i");
        if (localStorage.getItem("klyronTheme") === "light") {
          document.body.classList.add("light");
          themeIcon.classList.replace("fa-moon", "fa-sun");
        }
        toggleBtn.addEventListener("click", () => {
          document.body.classList.toggle("light");
          const isLight = document.body.classList.contains("light");
          localStorage.setItem("klyronTheme", isLight ? "light" : "dark");
          themeIcon.className = isLight
            ? "fa-solid fa-sun"
            : "fa-solid fa-moon";
        });
        setTimeout(() => {
          const amina = users.find((u) => u.id === "amina");
          if (amina && amina.lastMessage === "Typing...") {
            amina.lastMessage = "Hey! How are you? ✨";
            amina.time = "now";
            renderChats();
          }
        }, 4000);
      }
      init();
    </script>
  </body>
</html>
